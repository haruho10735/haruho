<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Football Pack Opening</title>

<style>

body{
background:#0b1220;
color:white;
font-family:sans-serif;
text-align:center;
}

h1{
margin:20px;
}

button{
padding:15px 30px;
font-size:18px;
border-radius:10px;
border:none;
background:#00bfff;
color:white;
cursor:pointer;
margin:10px;
}

#tunnel{
display:none;
height:200px;
margin:40px auto;
width:80%;
border-radius:20px;
background:linear-gradient(90deg,#111,#333,#111);
animation:tunnelMove 1s infinite linear;
}

@keyframes tunnelMove{
0%{background-position:0 0}
100%{background-position:400px 0}
}

.card{

width:280px;
height:400px;
margin:30px auto;
border-radius:15px;
background:linear-gradient(#111,#222);
padding:20px;

box-shadow:0 0 15px rgba(255,255,255,0.2);
}

.epic{
border:4px solid gold;
animation:glow 2s infinite;
}

.highlight{
border:4px solid cyan;
}

@keyframes glow{

0%{box-shadow:0 0 10px gold}
50%{box-shadow:0 0 30px gold}
100%{box-shadow:0 0 10px gold}

}

.card img{
width:120px;
border-radius:50%;
}

</style>

</head>

<body>

<h1>⚽ Football Pack Opening</h1>

<button onclick="gacha()">1回引く</button>
<button onclick="gacha10()">10連</button>

<div id="tunnel"></div>

<div id="result"></div>

<script>

const firstNames=[
"Lionel","Cristiano","Kylian","Erling","Kevin","Jude","Vinicius",
"Luka","Robert","Harry","Mohamed","Antoine","Bruno","Pedri"
]

const lastNames=[
"Messi","Ronaldo","Mbappe","Haaland","DeBruyne","Bellingham",
"Junior","Modric","Lewandowski","Kane","Salah","Griezmann"
]

const clubs=[
"Barcelona","Real Madrid","Manchester City","Liverpool",
"Bayern","PSG","Juventus","Chelsea","Arsenal"
]

const nations=[
"🇦🇷","🇵🇹","🇫🇷","🇧🇷","🇳🇴","🇧🇪","🇪🇸","🇩🇪","🇮🇹"
]

let players=[]

function generatePlayers(){

for(let i=0;i<3000;i++){

let rating=Math.floor(Math.random()*30)+70

let rarity="Normal"

if(rating>92) rarity="Epic"
else if(rating>88) rarity="Highlight"
else if(rating>80) rarity="Rare"

players.push({

name:firstNames[Math.floor(Math.random()*firstNames.length)]
+" "+
lastNames[Math.floor(Math.random()*lastNames.length)],

club:clubs[Math.floor(Math.random()*clubs.length)],

nation:nations[Math.floor(Math.random()*nations.length)],

rating:rating,

rarity:rarity,

img:"https://via.placeholder.com/120"

})

}

}

generatePlayers()

function gacha(){

openTunnel()

setTimeout(()=>{

let p=randomPlayer()

showCard(p)

},2000)

}

function gacha10(){

openTunnel()

setTimeout(()=>{

let html=""

for(let i=0;i<10;i++){

let p=randomPlayer()

html+=cardHTML(p)

}

document.getElementById("result").innerHTML=html

},2000)

}

function randomPlayer(){

return players[Math.floor(Math.random()*players.length)]

}

function openTunnel(){

document.getElementById("tunnel").style.display="block"

setTimeout(()=>{

document.getElementById("tunnel").style.display="none"

},2000)

}

function showCard(p){

document.getElementById("result").innerHTML=cardHTML(p)

}

function cardHTML(p){

return `

<div class="card ${p.rarity.toLowerCase()}">

<img src="${p.img}">

<h2>${p.name}</h2>

<p>${p.nation}</p>

<p>${p.club}</p>

<h3>OVR ${p.rating}</h3>

<p>${p.rarity}</p>

</div>

`

}

</script>

</body>
</html>
