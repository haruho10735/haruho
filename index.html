<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>eFootball ガチャ</title>

<style>

body{
background:#0b1e35;
font-family:sans-serif;
color:white;
text-align:center;
margin:0;
}

.header{
background:#00142b;
padding:15px;
font-size:22px;
}

button{
padding:12px 24px;
margin:10px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.single{background:#ffd700}
.ten{background:#00d0ff}

.pack{
width:200px;
height:260px;
margin:30px auto;
background:linear-gradient(#0d47a1,#1976d2);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
transition:.5s;
}

.open{
transform:rotateY(180deg) scale(1.1);
}

.card{
width:280px;
height:360px;
background:#111;
margin:20px auto;
border-radius:12px;
overflow:hidden;
display:none;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.star5{border:4px solid gold}
.star4{border:4px solid #29b6f6}
.star3{border:4px solid silver}

#collection{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
padding:20px;
}

.player{
background:#111;
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.rainbow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,purple);
background-size:400%;
animation:rainbow 2s linear infinite;
display:none;
}

@keyframes rainbow{
0%{background-position:0}
100%{background-position:400%}
}

</style>
</head>

<body>

<div class="header">⚽ eFootball ガチャ</div>

<button class="single" onclick="single()">1回ガチャ</button>
<button class="ten" onclick="ten()">10連ガチャ</button>

<div id="pack" class="pack">PACK</div>

<div id="card" class="card">
<img id="face">
<h2 id="name"></h2>
<p id="rarity"></p>
<p id="pos"></p>
</div>

<h2>コレクション</h2>
<div id="collection"></div>

<div id="rainbow" class="rainbow"></div>

<script>

/* -------------------- 実在選手データ -------------------- */

let players=[

/* ★5 */

{name:"Lionel Messi",rarity:5,pos:"RW"},
{name:"Cristiano Ronaldo",rarity:5,pos:"ST"},
{name:"Kylian Mbappe",rarity:5,pos:"ST"},
{name:"Erling Haaland",rarity:5,pos:"ST"},
{name:"Neymar",rarity:5,pos:"LW"},
{name:"Kevin De Bruyne",rarity:5,pos:"AMF"},
{name:"Jude Bellingham",rarity:5,pos:"CMF"},
{name:"Robert Lewandowski",rarity:5,pos:"ST"},
{name:"Harry Kane",rarity:5,pos:"ST"},
{name:"Mohamed Salah",rarity:5,pos:"RW"},
{name:"Vinicius Junior",rarity:5,pos:"LW"},
{name:"Rodri",rarity:5,pos:"DMF"},
{name:"Antoine Griezmann",rarity:5,pos:"SS"},
{name:"Luka Modric",rarity:5,pos:"CMF"},
{name:"Pedri",rarity:5,pos:"CMF"},

/* ★4 */

{name:"Bukayo Saka",rarity:4,pos:"RW"},
{name:"Phil Foden",rarity:4,pos:"AMF"},
{name:"Marcus Rashford",rarity:4,pos:"LW"},
{name:"Bruno Fernandes",rarity:4,pos:"AMF"},
{name:"Son Heung-min",rarity:4,pos:"LW"},
{name:"Lautaro Martinez",rarity:4,pos:"ST"},
{name:"Paulo Dybala",rarity:4,pos:"SS"},
{name:"Federico Chiesa",rarity:4,pos:"RW"},
{name:"Theo Hernandez",rarity:4,pos:"LB"},
{name:"Achraf Hakimi",rarity:4,pos:"RB"},
{name:"Declan Rice",rarity:4,pos:"DMF"},
{name:"Bernardo Silva",rarity:4,pos:"AMF"},
{name:"Jamal Musiala",rarity:4,pos:"AMF"},
{name:"Joshua Kimmich",rarity:4,pos:"DMF"},
{name:"Martin Odegaard",rarity:4,pos:"AMF"},

/* 日本代表 */

{name:"Kaoru Mitoma",rarity:3,pos:"LW"},
{name:"Takefusa Kubo",rarity:3,pos:"RW"},
{name:"Wataru Endo",rarity:3,pos:"DMF"},
{name:"Takehiro Tomiyasu",rarity:3,pos:"CB"},
{name:"Daichi Kamada",rarity:3,pos:"AMF"},
{name:"Ritsu Doan",rarity:3,pos:"RW"},
{name:"Junichi Ito",rarity:3,pos:"RW"},
{name:"Hidemasa Morita",rarity:3,pos:"CMF"},
{name:"Takumi Minamino",rarity:3,pos:"AMF"}

];

/* ---------- 実在選手をさらに大量追加 ---------- */

let extraPlayers=[

"Alisson","Ederson","Thibaut Courtois","Jan Oblak","Marc-Andre ter Stegen",
"Virgil van Dijk","Ruben Dias","John Stones","Antonio Rudiger","Kalidou Koulibaly",
"Andrew Robertson","Trent Alexander-Arnold","Reece James","Ben Chilwell",
"Casemiro","Toni Kroos","Ilkay Gundogan","Marco Verratti","Nicolo Barella",
"Serge Gnabry","Kingsley Coman","Leroy Sane","Ousmane Dembele","Rafael Leao",
"Joao Felix","Darwin Nunez","Gabriel Jesus","Julian Alvarez","Victor Osimhen",
"Romelu Lukaku","Edin Dzeko","Dusan Vlahovic","Ciro Immobile","Alvaro Morata"

];

/* 1000人まで増やす */

for(let i=0;i<1000;i++){

let name=extraPlayers[i%extraPlayers.length]+" "+i

players.push({
name:name,
rarity:3,
pos:"MF"
})

}

/* -------------------- ガチャロジック -------------------- */

function roll(){

let r=Math.random()

let rarity

if(r<0.07)rarity=5
else if(r<0.35)rarity=4
else rarity=3

let pool=players.filter(p=>p.rarity==rarity)

return pool[Math.floor(Math.random()*pool.length)]

}

/* -------------------- 表示 -------------------- */

function show(p){

let card=document.getElementById("card")

card.style.display="block"

card.className="card star"+p.rarity

document.getElementById("name").textContent=p.name
document.getElementById("rarity").textContent="★".repeat(p.rarity)
document.getElementById("pos").textContent=p.pos

document.getElementById("face").src=
"https://ui-avatars.com/api/?background=random&name="+encodeURIComponent(p.name)

}

/* -------------------- 演出 -------------------- */

function openPack(cb){

let pack=document.getElementById("pack")

pack.classList.add("open")

setTimeout(()=>{

pack.classList.remove("open")

cb()

},1000)

}

function rainbow(cb){

let r=document.getElementById("rainbow")

r.style.display="block"

setTimeout(()=>{

r.style.display="none"

cb()

},2000)

}

/* -------------------- ガチャ -------------------- */

function single(){

openPack(()=>{

let p=roll()

if(p.rarity==5) rainbow(()=>show(p))
else show(p)

})

}

function ten(){

let i=0

function next(){

if(i>=10)return

openPack(()=>{

let p=roll()

if(p.rarity==5) rainbow(()=>show(p))
else show(p)

i++

next()

})

}

next()

}

</script>

</body>
</html>
