<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Football Gacha</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #061426;
            color: white;
            text-align: center;
            padding-bottom: 50px;
        }

        .header {
            background: linear-gradient(180deg, #001b3a 0%, #000c1a 100%);
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #00d0ff;
            margin-bottom: 20px;
        }

        .controls {
            margin: 20px 0;
        }

        button {
            padding: 12px 25px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        button:active { transform: scale(0.95); }

        .single { background: #ffd700; color: #333; box-shadow: 0 4px 0 #b8860b; }
        .ten { background: #00d0ff; color: white; box-shadow: 0 4px 0 #008ebf; }

        #result {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            min-height: 300px;
        }

        /* カードデザイン */
        .card {
            width: 200px;
            background: #111;
            border-radius: 15px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.3s ease;
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #222;
            margin-bottom: 10px;
        }

        /* レアリティ別演出 */
        .star5 { border-color: gold; box-shadow: 0 0 15px gold; background: linear-gradient(135deg, #111 0%, #2a2200 100%); }
        .star4 { border-color: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
        .star3 { border-color: #888; }

        .card h3 { margin: 10px 0 5px; font-size: 16px; }
        .card .info { font-size: 12px; color: #aaa; margin-bottom: 10px; }
        .card .ovr { font-size: 20px; font-weight: bold; color: gold; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            font-size: 11px;
            margin-top: 10px;
            text-align: left;
        }

        .stat-item { border-bottom: 1px solid #222; padding: 2px; }

        /* コレクションセクション */
        .coll-title {
            margin-top: 40px;
            padding: 10px;
            background: #001b3a;
        }

        #collection {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 20px;
        }

        .item {
            background: #1a1a1a;
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 20px;
            border: 1px solid #333;
            color: #ddd;
        }
    </style>
</head>

<body>

<div class="header">⚽ Real Player Gacha</div>

<div class="controls">
    <button class="single" onclick="draw(1)">1回引く</button>
    <button class="ten" onclick="draw(10)">10連ガチャ</button>
</div>

<div id="result"></div>

<div class="coll-title">獲得済み選手（図鑑）</div>
<div id="collection"></div>

<script>
/* ===== 選手データ（整理済み） ===== */
const players = [
    /* ★5 */
    {name:"Lionel Messi",club:"Inter Miami",nation:"🇦🇷",pos:"RW",ovr:95,spd:85,sht:92,pas:95,dri:97,def:38,phy:65,rarity:5},
    {name:"Cristiano Ronaldo",club:"Al Nassr",nation:"🇵🇹",pos:"ST",ovr:94,spd:83,sht:94,pas:80,dri:88,def:35,phy:78,rarity:5},
    {name:"Kylian Mbappé",club:"Real Madrid",nation:"🇫🇷",pos:"ST",ovr:93,spd:97,sht:90,pas:80,dri:92,def:36,phy:76,rarity:5},
    {name:"Erling Haaland",club:"Man City",nation:"🇳🇴",pos:"ST",ovr:92,spd:89,sht:96,pas:75,dri:85,def:45,phy:90,rarity:5},
    {name:"Kevin De Bruyne",club:"Man City",nation:"🇧🇪",pos:"AMF",ovr:91,spd:75,sht:86,pas:94,dri:88,def:60,phy:78,rarity:5},
    {name:"Jude Bellingham",club:"Real Madrid",nation:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",pos:"CMF",ovr:91,spd:80,sht:85,pas:87,dri:88,def:78,phy:85,rarity:5},
    {name:"Vinicius Jr",club:"Real Madrid",nation:"🇧🇷",pos:"LW",ovr:90,spd:95,sht:85,pas:80,dri:94,def:40,phy:70,rarity:5},
    {name:"Harry Kane",club:"Bayern",nation:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",pos:"ST",ovr:91,spd:75,sht:92,pas:83,dri:82,def:50,phy:85,rarity:5},
    {name:"Robert Lewandowski",club:"Barcelona",nation:"🇵🇱",pos:"ST",ovr:91,spd:78,sht:93,pas:80,dri:85,def:45,phy:84,rarity:5},
    {name:"Mohamed Salah",club:"Liverpool",nation:"🇪🇬",pos:"RW",ovr:90,spd:92,sht:88,pas:82,dri:90,def:50,phy:75,rarity:5},
    {name:"Thibaut Courtois",club:"Real Madrid",nation:"🇧🇪",pos:"GK",ovr:90,spd:60,sht:40,pas:75,dri:60,def:92,phy:88,rarity:5},
    
    /* ★4 */
    {name:"Bukayo Saka",club:"Arsenal",nation:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",pos:"RW",ovr:88,spd:88,sht:83,pas:82,dri:90,def:60,phy:70,rarity:4},
    {name:"Son Heung-min",club:"Tottenham",nation:"🇰🇷",pos:"LW",ovr:89,spd:90,sht:88,pas:80,dri:85,def:50,phy:75,rarity:4},
    {name:"Federico Valverde",club:"Real Madrid",nation:"🇺🇾",pos:"CMF",ovr:88,spd:85,sht:85,pas:82,dri:85,def:80,phy:88,rarity:4},
    {name:"Martin Ødegaard",club:"Arsenal",nation:"🇳🇴",pos:"AMF",ovr:87,spd:78,sht:80,pas:88,dri:87,def:65,phy:68,rarity:4},
    {name:"Virgil van Dijk",club:"Liverpool",nation:"🇳🇱",pos:"CB",ovr:89,spd:78,sht:60,pas:75,dri:70,def:92,phy:90,rarity:4},
    {name:"Rodri",club:"Man City",nation:"🇪🇸",pos:"DMF",ovr:89,spd:70,sht:80,pas:88,dri:82,def:90,phy:88,rarity:4},

    /* ★3 */
    {name:"Kaoru Mitoma",club:"Brighton",nation:"🇯🇵",pos:"LW",ovr:82,spd:90,sht:75,pas:78,dri:88,def:50,phy:65,rarity:3},
    {name:"Takefusa Kubo",club:"Sociedad",nation:"🇯🇵",pos:"RW",ovr:82,spd:85,sht:78,pas:80,dri:88,def:55,phy:60,rarity:3},
    {name:"Wataru Endo",club:"Liverpool",nation:"🇯🇵",pos:"DMF",ovr:80,spd:70,sht:65,pas:75,dri:70,def:85,phy:82,rarity:3},
    {name:"Richarlison",club:"Tottenham",nation:"🇧🇷",pos:"ST",ovr:83,spd:85,sht:82,pas:70,dri:82,def:50,phy:80,rarity:3}
];

/* ===== ガチャロジック ===== */
function draw(n) {
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = ""; // 画面を一度クリア

    for (let i = 0; i < n; i++) {
        const p = players[Math.floor(Math.random() * players.length)];
        resultDiv.innerHTML += createCardHTML(p);
        saveToCollection(p.name);
    }
}

function createCardHTML(p) {
    return `
        <div class="card star${p.rarity}">
            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=random&color=fff">
            <div class="ovr">${p.ovr}</div>
            <h3>${p.name}</h3>
            <div class="info">${p.nation} ${p.club} | ${p.pos}</div>
            <div class="stats-grid">
                <div class="stat-item">SPD: ${p.spd}</div>
                <div class="stat-item">SHT: ${p.sht}</div>
                <div class="stat-item">PAS: ${p.pas}</div>
                <div class="stat-item">DRI: ${p.dri}</div>
                <div class="stat-item">DEF: ${p.def}</div>
                <div class="stat-item">PHY: ${p.phy}</div>
            </div>
        </div>
    `;
}

/* ===== 保存・コレクション ===== */
// Setを使って重複を防ぐ
let col = new Set(JSON.parse(localStorage.getItem("football_col")) || []);

function saveToCollection(name) {
    col.add(name);
    localStorage.setItem("football_col", JSON.stringify(Array.from(col)));
    renderCollection();
}

function renderCollection() {
    const c = document.getElementById("collection");
    c.innerHTML = "";
    // アルファベット順に並び替えて表示
    Array.from(col).sort().forEach(n => {
        c.innerHTML += `<div class="item">${n}</div>`;
    });
}

// 起動時にコレクションを表示
renderCollection();
</script>

</body>
</html>
