    <style>
        :root {
            --pitch-green: #1b5e20;
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
        }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #050a10; color: white; text-align: center; overflow-x: hidden; }
        
        .header { background: linear-gradient(135deg, #001f3f, #001021); padding: 25px; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .date-info { font-size: 14px; color: #00d0ff; font-weight: bold; }

        .controls { margin: 20px 0; background: rgba(255,255,255,0.05); padding: 15px; }
        button { padding: 12px 28px; margin: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-draw { background: var(--gold); color: #000; box-shadow: 0 4px 0 #b8860b; }
        .btn-draw:active { transform: translateY(4px); box-shadow: none; }
        .btn-team { background: #007bff; color: white; box-shadow: 0 4px 0 #0056b3; }

        /* ガチャ結果 */
        #result { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 20px; min-height: 180px; }
        .card { width: 150px; background: #1a1a1a; border-radius: 8px; padding: 12px; border: 1px solid #333; position: relative; transition: 0.3s; }
        .card:hover { transform: scale(1.05); z-index: 10; }
        .star5 { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); background: linear-gradient(145deg, #1a1a1a, #2a2400); }
        .star4 { border: 2px solid #00d0ff; }
        
        .ovr { position: absolute; top: -10px; left: -10px; width: 35px; height: 35px; background: var(--gold); color: #000; font-weight: bold; border-radius: 50%; line-height: 35px; border: 2px solid #fff; }
        .pos-tag { font-size: 10px; background: #444; padding: 2px 5px; border-radius: 3px; }

        /* ピッチ */
        .pitch-container {
            position: relative; width: 380px; height: 520px; background: var(--pitch-green); margin: 30px auto;
            border: 5px solid #fff; border-radius: 15px;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 50% 50%, transparent 50px, #fff 51px, transparent 52px);
            background-size: 100% 40px, 100% 100%;
        }
        .center-line { position: absolute; top: 50%; width: 100%; height: 2px; background: #fff; }

        .player-on-pitch { position: absolute; width: 80px; transform: translateX(-50%); text-align: center; }
        .p-icon { width: 45px; height: 45px; border-radius: 50%; background: #fff; color: #000; line-height: 45px; font-weight: bold; margin: 0 auto; border: 2px solid var(--gold); font-size: 18px; }
        .p-name { font-size: 11px; background: rgba(0,0,0,0.8); color: white; padding: 2px; border-radius: 4px; margin-top: 4px; overflow: hidden; white-space: nowrap; }

        #collection { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 20px; background: #0a1118; border-top: 2px solid #333; }
        .item { font-size: 11px; background: #1a1a1a; padding: 4px 10px; border-radius: 20px; border: 1px solid #444; }
    </style>
</head>
