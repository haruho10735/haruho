/* ===== ガチャ ===== */

function draw(n){

let html=""

for(let i=0;i<n;i++){

let p=players[Math.floor(Math.random()*players.length)]

html+=card(p)

save(p)

}

document.getElementById("result").innerHTML=html

}

/* ===== カード ===== */

function card(p){

return `

<div class="card star${p.rarity}">

<img src="https://ui-avatars.com/api/?name=${p.name}">

<h3>${p.name}</h3>
<p>${p.nation} ${p.club}</p>

<p>OVR ${p.ovr}</p>

<div class="stat">SPD ${p.spd} | SHT ${p.sht}</div>
<div class="stat">PAS ${p.pas} | DRI ${p.dri}</div>
<div class="stat">DEF ${p.def} | PHY ${p.phy}</div>

</div>

`

}

/* ===== 保存 ===== */

let col=JSON.parse(localStorage.getItem("col"))||[]

function save(p){

col.push(p.name)

localStorage.setItem("col",JSON.stringify(col))

render()

}

function render(){

let c=document.getElementById("collection")

c.innerHTML=""

col.forEach(n=>{

c.innerHTML+=`<div class="item">${n}</div>`

})

}

render()
